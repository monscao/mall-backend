name: Deploy To Server

on:
  workflow_dispatch:
    inputs:
      backend_image:
        description: Backend image tag to deploy
        required: false
        default: ""
      frontend_image:
        description: Frontend image tag to deploy
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure remote deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Build deployment env file
        run: |
          cat <<EOF > deploy/.env.prod
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          AUTH_JWT_SECRET=${{ secrets.AUTH_JWT_SECRET }}
          BACKEND_IMAGE=${{ github.event.inputs.backend_image || format('ghcr.io/{0}/mall-backend:latest', github.repository_owner) }}
          FRONTEND_IMAGE=${{ github.event.inputs.frontend_image || format('ghcr.io/{0}/mall-frontend:latest', github.repository_owner) }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          EOF

      - name: Upload deploy assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/docker-compose.prod.yml,deploy/.env.prod
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
