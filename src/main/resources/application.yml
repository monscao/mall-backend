spring:
  application:
    name: mall-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mall_db}
    username: ${SPRING_DATASOURCE_USERNAME:monscao}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

auth:
  jwt-secret: ${AUTH_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  token-expiration-minutes: ${AUTH_TOKEN_EXPIRATION_MINUTES:120}

app:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  frontend-version: ${APP_FRONTEND_VERSION:0.1.0}
  upload-dir: ${APP_UPLOAD_DIR:uploads}
